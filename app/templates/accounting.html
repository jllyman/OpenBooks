{% extends "base.html" %}
{% block content %}
<section class="page-head">
    <div><p class="eyebrow">Accounting backbone</p><h2>Chart of accounts</h2></div>
</section>

<section class="split wide">
    <article class="panel form-panel">
        <h3>Create account</h3>
        <form method="post" action="{{ url_for('create_account') }}">
            <label>Name<input name="name" required></label>
            <label>Type
                <select name="account_type" required>
                    <option>Asset</option>
                    <option>Liability</option>
                    <option>Equity</option>
                    <option>Income</option>
                    <option>Expense</option>
                    <option>Cost of Goods Sold</option>
                </select>
            </label>
            <label>Detail type<input name="detail_type" placeholder="Bank, AR, Materials, Revenue"></label>
            <label>Opening balance
                <span class="money-field"><span>$</span><input name="opening_balance" type="number" step="0.01" value="0.00"></span>
            </label>
            <label>Description<textarea name="description" rows="4"></textarea></label>
            <label class="check-row"><input name="is_active" type="checkbox" checked> Active</label>
            <button type="submit">Save account</button>
        </form>
    </article>

    <article class="panel">
        <h3>Account list</h3>
        <div class="edit-list">
            {% for account in accounts %}
                <form method="post" action="{{ url_for('update_account', account_id=account.id) }}" class="edit-row account-edit-row">
                    <label>Name<input name="name" value="{{ account.name }}" required></label>
                    <label>Type
                        <select name="account_type" required>
                            {% for account_type in ["Asset", "Liability", "Equity", "Income", "Expense", "Cost of Goods Sold"] %}
                                <option {% if account.account_type == account_type %}selected{% endif %}>{{ account_type }}</option>
                            {% endfor %}
                        </select>
                    </label>
                    <label>Detail<input name="detail_type" value="{{ account.detail_type or '' }}"></label>
                    <label>Opening
                        <span class="money-field"><span>$</span><input name="opening_balance" type="number" step="0.01" value="{{ account.opening_balance }}"></span>
                    </label>
                    <label>Description<textarea name="description" rows="2">{{ account.description or '' }}</textarea></label>
                    <label class="check-row"><input name="is_active" type="checkbox" {% if account.is_active %}checked{% endif %}> Active</label>
                    <button type="submit" class="small-button">Update</button>
                </form>
            {% else %}
                <p>No accounts yet.</p>
            {% endfor %}
        </div>
    </article>
</section>
{% endblock %}
