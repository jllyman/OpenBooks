{% extends "base.html" %}
{% block content %}
<section class="page-head">
    <div><p class="eyebrow">Directory</p><h2>Customers</h2></div>
</section>

<section class="split">
    <article class="panel form-panel">
        <h3>Add customer</h3>
        <form method="post">
            <label>Name<input name="name" required></label>
            <label>Email<input name="email" type="email"></label>
            <label>Phone<input name="phone"></label>
            <label>Notes<textarea name="notes" rows="4"></textarea></label>
            <button type="submit">Save customer</button>
        </form>
    </article>

    <article class="panel">
        <h3>Customer list</h3>
        <div class="edit-list">
        {% for customer in customers %}
            <form method="post" action="{{ url_for('update_customer', customer_id=customer.id) }}" class="edit-row customer-edit-row">
                <label>Name<input name="name" value="{{ customer.name }}" required></label>
                <label>Email<input name="email" type="email" value="{{ customer.email or '' }}"></label>
                <label>Phone<input name="phone" value="{{ customer.phone or '' }}"></label>
                <label>Notes<textarea name="notes" rows="2">{{ customer.notes or '' }}</textarea></label>
                <button type="submit" class="small-button">Update</button>
            </form>
        {% else %}
            <p>No customers yet.</p>
        {% endfor %}
        </div>
    </article>
</section>
{% endblock %}
